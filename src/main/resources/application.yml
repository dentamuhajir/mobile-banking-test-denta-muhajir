server:
  port: 8080

spring:
  application:
    name: mobile-banking-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mobile_banking}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret-key: ${JWT_SECRET:MzY0YmY4N2Y1M2NlYmI2ODVjM2E1YmU3MGY5YzM0YmI5MTY2YThmYmY0ZTI3M2M1YmVkYmE4ZGNlMmU3YmI2Zg==}
  ttl-ms: ${JWT_TTL:3600000} # 1 hour